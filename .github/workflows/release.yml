name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact_arch: aarch64
            args: --target aarch64-apple-darwin
          - target: x86_64-apple-darwin
            artifact_arch: x64
            args: --target x86_64-apple-darwin

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build Tauri artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          tauriScript: pnpm tauri
          retryAttempts: 2
          args: ${{ matrix.args }}

      - name: Name app archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          cd target/${{ matrix.target }}/release/bundle/macos
          mv ScaleBridge.app.tar.gz ScaleBridge_${version}_${{ matrix.artifact_arch }}.app.tar.gz

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-slim
    needs: build
    timeout-minutes: 5

    steps:
      - name: Download Tauri artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: tauri-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ScaleBridge ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: release-assets/**/*
          fail_on_unmatched_files: true
          overwrite_files: true
